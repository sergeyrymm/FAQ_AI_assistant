<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Сергей Рымарев — промпт-инженер</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-deep: #0f172a;
      --bg-card: rgba(15, 23, 42, 0.65);
      --border: rgba(148, 163, 184, 0.28);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent-a: #4f46e5;
      --accent-b: #06b6d4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 48px;
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(79, 70, 229, 0.35), transparent),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(6, 182, 212, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 0% 80%, rgba(129, 140, 248, 0.15), transparent);
    }

    .shell {
      width: 100%;
      max-width: 520px;
    }

    .card {
      position: relative;
      padding: 32px 28px 36px;
      border-radius: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: 0 24px 80px rgba(2, 6, 23, 0.55);
      backdrop-filter: blur(16px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.5), rgba(6, 182, 212, 0.35), transparent 55%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .intro::first-line {
      font-size: clamp(1.55rem, 3.5vw, 1.95rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f1f5f9;
    }

    .intro {
      margin: 0 0 28px;
      font-size: 1.05rem;
      line-height: 1.65;
      color: #cbd5e1;
      white-space: pre-line;
    }

    .cta-row {
      margin-top: 0;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      color: #f8fafc;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      box-shadow: 0 10px 36px rgba(79, 70, 229, 0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 44px rgba(6, 182, 212, 0.35);
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta span {
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <article class="card">
      <p class="intro">Сергей Рымарев
Промпт-инженер
Главная страница сайта-визитки.
 Примеры проектов</p>
      <div class="cta-row">
        <a class="cta" href="aiassist.html"><span>✦</span> Открыть ИИ-ассистента</a>
      </div>
    </article>
  </div>
</body>
</html>
